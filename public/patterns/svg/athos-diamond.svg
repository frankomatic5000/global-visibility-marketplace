<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="diamondPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Diamond shape -->
      <polygon points="50,0 100,50 50,100 0,50" fill="#1E5AA8" opacity="0.9"/>
      <!-- Inner diamond detail -->
      <polygon points="50,20 80,50 50,80 20,50" fill="#3B82C6" opacity="0.7"/>
      <!-- Corner triangles -->
      <polygon points="0,0 25,0 0,25" fill="#60A5FA" opacity="0.5"/>
      <polygon points="100,0 100,25 75,0" fill="#60A5FA" opacity="0.5"/>
      <polygon points="0,100 0,75 25,100" fill="#60A5FA" opacity="0.5"/>
      <polygon points="100,100 75,100 100,75" fill="#60A5FA" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#FFFFFF"/>
  
  <!-- Pattern application -->
  <rect width="200" height="200" fill="url(#diamondPattern)"/>
  
  <!-- Gold accent overlay -->
  <circle cx="50" cy="50" r="15" fill="#F59E0B" opacity="0.6"/>
  <circle cx="150" cy="150" r="12" fill="#F59E0B" opacity="0.4"/>
</svg>