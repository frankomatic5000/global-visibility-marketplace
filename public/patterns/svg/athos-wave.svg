<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E5AA8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82C6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#DBEAFE"/>
  
  <!-- Organic wave forms -->
  <path d="M-50,100 Q50,50 150,100 T350,100 L350,400 L-50,400 Z" fill="url(#waveGrad1)" opacity="0.9"/>
  <path d="M-50,150 Q100,100 200,150 T450,150 L450,400 L-50,400 Z" fill="#3B82C6" opacity="0.6"/>
  <path d="M-50,250 Q80,200 180,250 T400,250 L400,400 L-50,400 Z" fill="url(#waveGrad2)" opacity="0.8"/>
  <path d="M-50,320 Q120,280 220,320 T450,320 L450,400 L-50,400 Z" fill="#60A5FA" opacity="0.4"/>
  
  <!-- Accent circles -->
  <circle cx="300" cy="80" r="40" fill="#F59E0B" opacity="0.3"/>
  <circle cx="100" cy="300" r="60" fill="#1E5AA8" opacity="0.2"/>
</svg>